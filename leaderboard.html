<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Leaderboard — BDOH</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#007B8F;--teal-lt:#00b4cc;--green:#4CAF50;--gold:#FFD700;
  --bg:#06091A;--bg2:#090d22;--bg3:#0e1330;
  --sf:rgba(255,255,255,.045);--bd:rgba(255,255,255,.08);--ba:rgba(0,123,143,.3);
  --txt:#eef1ff;--m:rgba(238,241,255,.58);--d:rgba(238,241,255,.3);
  --fH:'Plus Jakarta Sans',sans-serif;--fB:'DM Sans',sans-serif;
  --gb:linear-gradient(90deg,#007B8F,#4CAF50);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{
  -webkit-font-smoothing:antialiased;min-height:100%;
  background-color:var(--bg);
  background-image:url('assets/dark_leaderboard_hero.png');
  background-size:cover;background-position:center top;
  background-attachment:fixed;background-repeat:no-repeat;
}
html::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:rgba(6,9,26,.68);
}
body{background:transparent;color:var(--txt);font-family:var(--fB);min-height:100vh;padding-top:64px;position:relative;z-index:1}
a{color:inherit;text-decoration:none}
button{font-family:var(--fB);cursor:pointer;border:none;background:none}

/* NAVBAR */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:800;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px clamp(16px,4vw,48px);
  background:rgba(6,9,26,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);min-height:64px;
}
.nav-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-logo-img{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0}
.nav-title{font-family:var(--fH);font-weight:800;font-size:15px;color:var(--txt)}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-btn{
  display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;
  background:var(--sf);border:1px solid var(--bd);color:var(--m);
  font-family:var(--fH);font-size:13px;font-weight:600;
  transition:all .2s;white-space:nowrap;text-decoration:none;
}
.nav-btn:hover{border-color:var(--ba);color:var(--txt)}
@media(max-width:480px){
  .nav-btn span{display:none}
  .nav-btn{padding:8px 12px}
}

/* LAYOUT */
.container{max-width:1000px;margin:0 auto;padding:clamp(28px,4vw,44px) clamp(14px,4vw,40px)}

/* PAGE HEADER */
.page-header{text-align:center;margin-bottom:44px;padding:0 16px}
.page-eyebrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px}
.eyebrow-line{flex:none;width:36px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,204,.5))}
.eyebrow-line.r{background:linear-gradient(90deg,rgba(0,180,204,.5),transparent)}
.eyebrow-text{font-family:var(--fH);font-size:10px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--teal-lt);opacity:.85}
.page-title{
  font-family:var(--fH);font-size:clamp(34px,5vw,60px);font-weight:800;
  color:var(--txt);letter-spacing:-1.5px;line-height:1;margin-bottom:14px;
  text-shadow:0 0 60px rgba(0,180,204,.12);
}
.page-title span{background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-sub{color:var(--m);font-size:14px;max-width:500px;margin:0 auto;line-height:1.7}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:40px;padding:0 8px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
.podium-crown-slot{height:30px;display:flex;align-items:center;justify-content:center}
.podium-avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fH);font-weight:800;color:#fff;border:3px solid;
  background:linear-gradient(135deg,#007B8F,#4CAF50);overflow:hidden;flex-shrink:0;
}
.podium-avatar img{width:100%;height:100%;object-fit:cover}
.podium-1 .podium-avatar{width:80px;height:80px;font-size:24px;border-color:var(--gold);box-shadow:0 0 30px rgba(255,215,0,.28)}
.podium-2 .podium-avatar{width:68px;height:68px;font-size:20px;border-color:#c0c0c0}
.podium-3 .podium-avatar{width:60px;height:60px;font-size:18px;border-color:#cd7f32}
.podium-name{font-family:var(--fH);font-size:13px;font-weight:700;color:var(--txt);text-align:center;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-rating{font-family:var(--fH);font-size:12px;font-weight:700}
.podium-block{
  border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;
  font-family:var(--fH);font-size:22px;font-weight:800;color:rgba(255,255,255,.28);letter-spacing:-1px;
}
.podium-1 .podium-block{width:100px;height:72px;background:linear-gradient(180deg,rgba(255,215,0,.2),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.2)}
.podium-2 .podium-block{width:90px;height:54px;background:rgba(192,192,192,.09);border:1px solid rgba(192,192,192,.16)}
.podium-3 .podium-block{width:84px;height:40px;background:rgba(205,127,50,.09);border:1px solid rgba(205,127,50,.16)}

/* CONTROLS */
.lb-controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.lb-tabs{display:flex;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:4px;flex-shrink:0}
.lb-tab{padding:9px 18px;border-radius:9px;font-family:var(--fH);font-size:13px;font-weight:700;color:var(--m);transition:all .2s;cursor:pointer;border:none;background:none}
.lb-tab.active{background:rgba(0,123,143,.2);color:var(--txt);box-shadow:inset 0 0 0 1px rgba(0,180,204,.28)}
.lb-search{flex:1;min-width:180px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:10px 16px;font-family:var(--fB);font-size:14px;color:var(--txt);outline:none;transition:border-color .2s}
.lb-search:focus{border-color:var(--teal)}
.lb-search::placeholder{color:var(--d)}
.lb-topic-filter{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;font-family:var(--fB);font-size:14px;color:var(--txt);outline:none;cursor:pointer;display:none}
.lb-topic-filter option{background:#0e1330}

/* TABLE */
.lb-card{background:rgba(14,19,48,.7);border:1px solid var(--bd);border-radius:16px;overflow:hidden;backdrop-filter:blur(16px)}
.lb-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lb-table{width:100%;border-collapse:collapse;min-width:480px}
.lb-table thead th{
  text-align:left;padding:13px 18px;font-family:var(--fH);font-size:10.5px;
  font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--m);
  background:rgba(0,0,0,.18);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:1;white-space:nowrap;
}
.lb-table tbody tr{border-bottom:1px solid rgba(255,255,255,.035);transition:background .15s;cursor:pointer}
.lb-table tbody tr:hover{background:rgba(0,123,143,.07)}
.lb-table tbody tr.me{background:rgba(0,123,143,.12);border-left:3px solid var(--teal)}
.lb-table tbody td{padding:13px 18px;font-size:13.5px;color:var(--m)}

.rank-cell{font-family:var(--fH);font-size:13px;font-weight:800;width:52px}
.rk-1{color:var(--gold)}.rk-2{color:#c0c0c0}.rk-3{color:#cd7f32}
.rank-badge{display:inline-flex;width:28px;height:28px;border-radius:50%;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.rank-badge.g{background:rgba(255,215,0,.18);color:var(--gold)}
.rank-badge.s{background:rgba(192,192,192,.12);color:#c0c0c0}
.rank-badge.b{background:rgba(205,127,50,.12);color:#cd7f32}

.user-cell{display:flex;align-items:center;gap:12px}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--gb);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fH);font-weight:800;color:#fff;font-size:13px;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-name{font-family:var(--fH);font-size:14px;font-weight:700;color:var(--txt);line-height:1.3}
.user-inst{font-size:11px;color:var(--d);margin-top:2px}
.me-tag{font-size:9px;padding:2px 7px;border-radius:5px;background:rgba(0,123,143,.2);border:1px solid var(--ba);color:var(--teal-lt);font-family:var(--fH);font-weight:800;margin-left:7px;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle}

.rating-val{font-family:var(--fH);font-weight:800}
.solves-val{font-family:var(--fH);font-weight:700;color:var(--txt)}

.acc-bar{display:flex;align-items:center;gap:8px}
.acc-bar-track{width:52px;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;flex-shrink:0}
.acc-bar-fill{height:100%;background:var(--gb);border-radius:3px}
.acc-val{font-family:var(--fH);font-weight:700;font-size:13px}

.empty-state{text-align:center;padding:60px 20px;color:var(--d);font-family:var(--fH);font-size:14px}

/* SKELETON */
.skeleton{background:rgba(255,255,255,.055);border-radius:8px;animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:.45}50%{opacity:.85}}

/* MOBILE */
@media(max-width:600px){
  body{padding-top:60px}
  .navbar{padding:12px 16px;min-height:60px}
  .nav-title{font-size:14px}
  .nav-logo-img{width:32px;height:32px}
  .podium{gap:6px;padding:0 4px}
  .podium-item{flex:1;min-width:0;max-width:33%}
  .podium-1 .podium-avatar{width:60px;height:60px;font-size:18px}
  .podium-2 .podium-avatar{width:52px;height:52px;font-size:16px}
  .podium-3 .podium-avatar{width:44px;height:44px;font-size:14px}
  .podium-1 .podium-block{width:100%;min-width:0;height:60px}
  .podium-2 .podium-block{width:100%;min-width:0;height:46px}
  .podium-3 .podium-block{width:100%;min-width:0;height:34px}
  .podium-name{font-size:10px;max-width:76px}
  .podium-rating{font-size:10px}
  .lb-controls{flex-direction:column;align-items:stretch;gap:8px}
  .lb-tabs{justify-content:center}
  .lb-search{min-width:0}
  .lb-table thead th:nth-child(5),.lb-table tbody td:nth-child(5),
  .lb-table thead th:nth-child(6),.lb-table tbody td:nth-child(6){display:none}
  .lb-table tbody td{padding:11px 12px;font-size:13px}
  .user-av{width:30px;height:30px;font-size:11px}
  .user-name{font-size:13px}
  .page-header{margin-bottom:28px}
  .page-title{font-size:clamp(28px,9vw,42px);letter-spacing:-1px}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <a href="index.html" style="display:flex;align-items:center;gap:10px">
      <img src="assets/logo.png" alt="BDOH" class="nav-logo-img"/>
      <div class="nav-title">Leaderboard</div>
    </a>
  </div>
  <div class="nav-links">
    <a href="profile.html" class="nav-btn">
      <svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
      <span>Profile</span>
    </a>
    <a href="index.html" class="nav-btn">
      <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
      <span>Home</span>
    </a>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <div class="page-eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Rankings</span>
      <span class="eyebrow-line r"></span>
    </div>
    <h1 class="page-title">Global <span>Leaderboard</span></h1>
    <p class="page-sub">Every problem solved, every contest won, every point earned — it all counts here.</p>
  </div>

  <div class="podium" id="podiumArea">
    <div class="skeleton" style="width:220px;height:160px;border-radius:12px"></div>
  </div>

  <div class="lb-controls">
    <div class="lb-tabs">
      <button class="lb-tab active" onclick="switchTab('global',this)">Global</button>
      <button class="lb-tab" onclick="switchTab('contest',this)">Contest</button>
      <button class="lb-tab" onclick="switchTab('solvers',this)">Top Solvers</button>
    </div>
    <input class="lb-search" id="lbSearch" type="text" placeholder="Search by name…" oninput="filterTable()"/>
    <select class="lb-topic-filter" id="topicFilter" onchange="filterTable()">
      <option value="">All Topics</option>
      <option>Physics</option>
      <option>Mathematics</option>
      <option>Chemistry</option>
      <option>Biology</option>
      <option>Astronomy</option>
      <option>Informatics</option>
    </select>
  </div>

  <div class="lb-card">
    <div class="lb-table-wrap">
      <table class="lb-table">
        <thead>
          <tr>
            <th style="width:52px">Rank</th>
            <th>Player</th>
            <th>Rating</th>
            <th>Solved</th>
            <th>Accuracy</th>
            <th>Institution</th>
          </tr>
        </thead>
        <tbody id="lbTbody">
          <tr><td colspan="6" style="padding:40px 20px">
            <div class="skeleton" style="height:38px;margin-bottom:10px"></div>
            <div class="skeleton" style="height:38px;margin-bottom:10px"></div>
            <div class="skeleton" style="height:38px"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script>
let allRows = [], currentTab = 'global', currentUserUid = null;

function getRatingColor(r){
  return r>=2400?'#f87171':r>=2200?'#FFD700':r>=2000?'#81c784':r>=1800?'#5bcfdf':'#00b4cc';
}

window.addEventListener('bdoh:authReady', e=>{ currentUserUid = e.detail.user?.uid||null; });

document.addEventListener('DOMContentLoaded', ()=>{
  bdohFirebaseReady(async()=>{
    if(!window.BDOH_DB){ renderEmpty('Could not connect to the database.'); return; }
    await loadTab('global');
  });
});

async function switchTab(tab, el){
  document.querySelectorAll('.lb-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  document.getElementById('topicFilter').style.display = tab==='solvers'?'block':'none';
  await loadTab(tab);
}

async function loadTab(tab){
  setLoading();
  try {
    let data = [];
    if(tab==='global'||tab==='solvers'){
      data = await window.BDOH_DB.getLeaderboard(tab);
    } else {
      const contests = await window.BDOH_DB.getContests();
      const past = contests.filter(c=>c.status==='past'||c.status==='live');
      if(!past.length){ renderEmpty('No contest results available yet.'); return; }
      data = await window.BDOH_DB.getContestLeaderboard(past[0].id);
    }
    allRows = data;
    renderTable(data);
    renderPodium(data.slice(0,3));
  } catch(e){
    console.error(e);
    renderEmpty('Failed to load leaderboard data.');
  }
}

function renderPodium(top3){
  if(!top3.length){ document.getElementById('podiumArea').innerHTML=''; return; }
  const display=[];
  if(top3[1]) display.push({rank:2,data:top3[1]});
  display.push({rank:1,data:top3[0]});
  if(top3[2]) display.push({rank:3,data:top3[2]});
  const sizes={1:80,2:68,3:60}, heights={1:72,2:54,3:40}, blockW={1:100,2:90,3:84};
  const rColors={1:'#FFD700',2:'#c0c0c0',3:'#cd7f32'};
  const crownSVG=`<svg viewBox="0 0 24 24" width="24" height="24" fill="#FFD700" opacity=".9"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/></svg>`;
  document.getElementById('podiumArea').innerHTML=display.map(({rank,data:u})=>{
    const name=u.displayName||u.name||u.userName||'—';
    const initials=name.charAt(0).toUpperCase();
    return `<div class="podium-item podium-${rank}">
      <div class="podium-crown-slot">${rank===1?crownSVG:''}</div>
      <div class="podium-avatar" style="width:${sizes[rank]}px;height:${sizes[rank]}px;font-size:${(sizes[rank]/3.4).toFixed(0)}px;border-color:${rColors[rank]}">
        ${u.photoURL?`<img src="${u.photoURL}" alt="${name}" loading="lazy"/>`:`<span>${initials}</span>`}
      </div>
      <div class="podium-name" title="${name}">${name.split(' ').slice(0,2).join(' ')}</div>
      <div class="podium-rating" style="color:${rColors[rank]}">${u.rating||u.score||'—'}</div>
      <div class="podium-block" style="width:${blockW[rank]}px;height:${heights[rank]}px">${rank}</div>
    </div>`;
  }).join('');
}

function renderTable(rows){
  if(!rows.length){ renderEmpty(); return; }
  const topic=document.getElementById('topicFilter')?.value||'';
  let filtered=rows;
  if(topic) filtered=rows.filter(r=>r.topicStats&&r.topicStats[topic]);
  document.getElementById('lbTbody').innerHTML=filtered.map((r,i)=>{
    const rank=r.rank||(i+1), name=r.displayName||r.name||r.userName||'Unknown';
    const initials=name.charAt(0).toUpperCase();
    const isMe=r.userId===currentUserUid||r.id===currentUserUid;
    const rankCls=rank===1?'rk-1':rank===2?'rk-2':rank===3?'rk-3':'';
    const badgeCls=rank===1?'g':rank===2?'s':rank===3?'b':'';
    const rating=r.rating||r.score||1200, solved=r.totalSolves||r.totalSolved||r.solved||0, acc=r.accuracy||0;
    const link=r.userId||r.id?`profile.html?uid=${r.userId||r.id}`:'#';
    return `<tr class="${isMe?'me':''}" onclick="location.href='${link}'">
      <td class="rank-cell ${rankCls}">
        ${rank<=3
          ?`<span class="rank-badge ${badgeCls}">${rank}</span>`
          :`<span style="color:var(--d);font-size:13px;padding-left:2px">${rank}</span>`}
      </td>
      <td><div class="user-cell">
        <div class="user-av">${r.photoURL?`<img src="${r.photoURL}" alt="${name}" loading="lazy"/>`:`<span>${initials}</span>`}</div>
        <div>
          <div class="user-name">${name}${isMe?`<span class="me-tag">You</span>`:''}</div>
          <div class="user-inst">${r.institution||r.classGrade||'—'}</div>
        </div>
      </div></td>
      <td class="rating-val" style="color:${getRatingColor(rating)}">${rating}</td>
      <td class="solves-val">${solved}</td>
      <td><div class="acc-bar">
        <div class="acc-bar-track"><div class="acc-bar-fill" style="width:${acc}%"></div></div>
        <span class="acc-val">${acc}%</span>
      </div></td>
      <td style="font-size:12px;color:var(--d)">${r.institution||'—'}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="6" class="empty-state">No results match your filter.</td></tr>`;
}

function filterTable(){
  const q=document.getElementById('lbSearch').value.toLowerCase().trim();
  renderTable(allRows.filter(r=>(r.displayName||r.name||'').toLowerCase().includes(q)));
}

function renderEmpty(msg='No data available yet.'){
  document.getElementById('lbTbody').innerHTML=`<tr><td colspan="6" class="empty-state">${msg}</td></tr>`;
  document.getElementById('podiumArea').innerHTML='';
}

function setLoading(){
  document.getElementById('lbTbody').innerHTML=Array(5).fill(0).map(()=>`
    <tr><td colspan="6" style="padding:8px 18px">
      <div class="skeleton" style="height:38px;border-radius:8px"></div>
    </td></tr>`).join('');
}
</script>
</body>
</html>

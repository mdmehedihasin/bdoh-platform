<!--
────────────────────────────────────────────────────────────────
  PATCH 4 — Practice section teaser (OPTIONAL but recommended)
  Replace the entire #practice section content with this teaser
  card so the homepage still has a preview but clicks through
  to the full arena:
────────────────────────────────────────────────────────────────
-->

<section id="practice" class="section">
  <div class="container">
    <div class="practice-header">
      <div>
        <p class="s-tag reveal">Practice</p>
        <h2 class="s-title reveal rd1" style="margin-bottom:0">
          Featured <span class="grad-text">problems</span>
        </h2>
      </div>
      <a href="practice.html" class="btn-primary btn-sm reveal rd2"
         style="align-self:flex-end;text-decoration:none">
        Open full arena →
      </a>
    </div>

    <!-- Mini preview grid — 4 cards; these are static teasers only -->
    <div class="prob-grid" id="probBox" role="list"></div>

    <!-- "See all" CTA -->
    <div style="text-align:center;margin-top:24px" class="reveal">
      <a href="practice.html" class="btn-ghost btn-lg">
        Open Practice Arena — 1,635+ problems
        <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor">
          <path d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/>
        </svg>
      </a>
    </div>
  </div>
</section>
